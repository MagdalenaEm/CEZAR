<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moja Strona</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    nav {
      background: #222;
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 20px;
      font-size: 18px;
      transition: 0.3s;
    }

    nav a:hover {
      color: orange;
    }

    .content {
      padding: 40px;
      text-align: center;
    }

    h1 {
      color: #333;
    }
  </style>
</head>

<body>

  <nav>
    <a href="#">Oferta</a>
    <a href="#">Nowości</a>
    <a href="#">Promocje</a>
    <a href="#">Kontakt</a>
  </nav>

  <div class="content">
    <h1>Witaj na stronie!</h1>
    <p>Tu możesz dodać swoją treść.</p>
  </div>

</body>
</html>
