<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cezar Market</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f4f4;
    scroll-behavior:smooth;
}

/* HEADER */
header{
    background:#c40000;
    color:white;
    text-align:center;
    padding:25px;
}

/* NAVBAR */
.navbar{
    background:#222;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position: sticky;
    top:0;
    z-index:1000;
}

/* HAMBURGER */
.hamburger{
    font-size:26px;
    cursor:pointer;
    user-select:none;
}

/* MENU DESKTOP */
.menu{
    display:flex;
    gap:20px;
}

.menu a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.menu a:hover{
    color:yellow;
}

/* ACTIVE LINK */
.menu a.active{
    color:yellow;
    border-bottom:2px solid yellow;
}

/* MOBILE MENU (slide from right) */
@media (max-width:768px){

    .menu{
        position:fixed;
        top:0;
        right:-100%;
        height:100vh;
        width:70%;
        background:#222;
        flex-direction:column;
        padding:80px 20px;
        transition:0.3s;
    }

    .menu.open{
        right:0;
    }

    .menu a{
        padding:15px 0;
        font-size:18px;
    }
}

/* SEKCJE */
section{
    padding:30px;
}

h2{
    color:#c40000;
}

.produkty{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.karta{
    background:white;
    width:260px;
    border-radius:12px;
    padding:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.karta img{
    width:100%;
    border-radius:10px;
}

/* FOOTER */
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}

</style>
</head>

<body>

<header>
    <h1>Cezar Market</h1>
    <p>Polskie produkty spożywcze</p>
</header>

<nav class="navbar">

    <div class="hamburger" id="hamburger">☰</div>

    <div class="menu" id="menu">
        <a href="#produkty">Produkty</a>
        <a href="#promocje">Promocje</a>
        <a href="#nowosci">Nowości</a>
        <a href="#kontakt">Kontakt</a>
    </div>

</nav>

<section id="produkty">
    <h2>Produkty</h2>

    <div class="produkty">
        <div class="karta">
            <img src="IMG-20260519-WA0002.jpg">
            <h3>Parówki Tarczyński</h3>
            <p>500 g</p>
        </div>
    </div>
</section>

<section id="promocje">
    <h2>Promocje</h2>
    <p>🔥 Kup 2 produkty i odbierz 10% rabatu!</p>
</section>

<section id="nowosci">
    <h2>Nowości</h2>
</section>

<section id="kontakt">
    <h2>Kontakt</h2>
    <p>📍 Cezar Market</p>
    <p>📞 +31 123 456 789</p>
</section>

<footer>
    © 2026 Cezar Market
</footer>

<script>

const hamburger = document.getElementById("hamburger");
const menu = document.getElementById("menu");
const links = document.querySelectorAll(".menu a");

/* OPEN / CLOSE MENU */
hamburger.addEventListener("click", () => {
    menu.classList.toggle("open");

    // zmiana ☰ -> ✖
    hamburger.textContent = menu.classList.contains("open") ? "✖" : "☰";
});

/* AUTO CLOSE + ACTIVE LINK */
links.forEach(link => {

    link.addEventListener("click", () => {
        menu.classList.remove("open");
        hamburger.textContent = "☰";
    });

});

/* SCROLL ACTIVE SECTION */
window.addEventListener("scroll", () => {

    let fromTop = window.scrollY + 120;

    links.forEach(link => {
        let section = document.querySelector(link.getAttribute("href"));

        if (
            section.offsetTop <= fromTop &&
            section.offsetTop + section.offsetHeight > fromTop
        ) {
            link.classList.add("active");
        } else {
            link.classList.remove("active");
        }
    });

});

</script>

</body>
</html>
